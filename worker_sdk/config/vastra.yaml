# config.yaml
# SEGMENTATION: Grounding DINO (4-category prompt, enclosing filter, NMS) -> crops on white.

aws:
  # account_id is read from AWS_ACCOUNT_ID env var at runtime — not stored here.
  region: "us-east-1"
  work_bucket: "vastra"

queues:
  segmentation:   "vastra-dev-segmentation"
  analysis:       "vastra-dev-analysis"
  identification: "vastra-dev-identification"
  vton:           "vastra-dev-vton"
  avatar:         "vastra-dev-avatar"
  model_profile:  "vastra-dev-model-profile"
  results:        "vastra-dev-results"
  dlq:            "vastra-dev-dlq"

steps:
  ENHANCEMENT:
    filetype: "png"
    extensions: [".png"]
    hooks_path: "services.cloth_enhancement.hooks.Hooks"
    next:
      - SEGMENTATION
    queue: "identification"

  SEGMENTATION:
    filetype: "png"
    extensions: [".png"]
    hooks_path: "services.cloth_segmentation.hooks.Hooks"
    next:
      - ANALYSIS
    queue: "segmentation"

  ANALYSIS:
    filetype: "json"
    extensions: [".json"]
    hooks_path: "services.cloth_analysis.hooks.Hooks"
    queue: "analysis"
    # no next: terminal step

  VIRTUAL_TRY:
    filetype: "png"
    extensions: [".png", ".jpg", ".jpeg"]
    hooks_path: "services.virtualtry.hooks.Hooks"
    queue: "vton"

  AVATAR:
    filetype: "png"
    extensions: [".png"]
    hooks_path: "services.avatar.hooks.Hooks"
    queue: "avatar"

  MODEL_PROFILE:
    filetype: "png"
    extensions: [".png"]
    hooks_path: "services.model_profile.hooks.Hooks"
    queue: "model_profile"
    next:
      - AVATAR
